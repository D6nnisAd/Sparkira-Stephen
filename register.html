<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sparkira - Register</title>
    
    <!-- Favicon Suite -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
    <link rel="shortcut icon" href="assets/favicon/favicon.ico">
    <link rel="manifest" href="assets/favicon/manifest.json" crossorigin="use-credentials">
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5.3.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="auth-body">
    
    <div class="page-wrapper">
    <div class="container h-100 position-relative z-index-2 py-5">
        <div class="row h-100 justify-content-center align-items-center">
            <div class="col-12 col-md-8 col-lg-5 text-center px-4">
                
                <a href="index.html" class="d-inline-block mb-5">
                    <img src="assets/logo.svg" alt="Sparkira Logo" class="auth-logo" style="height: 50px;">
                </a>

                <h2 class="auth-heading text-white fw-bold mb-2">Create an Account</h2>
                <p class="text-white-50 mb-5">Ignite your creativity with Sparkira today.</p>

                <form id="registerForm" class="auth-form cardless-form">
                    
                    <div class="form-floating mb-4">
                        <input type="text" class="form-control cardless-input text-white" id="regFullName" placeholder="Full Name" required>
                        <label for="regFullName" class="text-white-50"><i class="fa-solid fa-user me-2"></i>Full Name</label>
                    </div>

                    <div class="form-floating mb-4">
                        <input type="text" class="form-control cardless-input text-white" id="regUsername" placeholder="Username" required>
                        <label for="regUsername" class="text-white-50"><i class="fa-solid fa-at me-2"></i>Username</label>
                    </div>

                    <div class="form-floating mb-4">
                        <input type="email" class="form-control cardless-input text-white" id="regEmail" placeholder="Email Address" required>
                        <label for="regEmail" class="text-white-50"><i class="fa-solid fa-envelope me-2"></i>Email Address</label>
                    </div>

                    <div class="form-floating mb-5 position-relative">
                        <input type="password" class="form-control cardless-input text-white" id="regPassword" placeholder="Password" required minlength="6">
                        <label for="regPassword" class="text-white-50"><i class="fa-solid fa-lock me-2"></i>Password</label>
                    </div>

                    <button type="submit" class="btn btn-primary-glowing rounded-pill w-100 py-3 fw-bold fs-5 mb-4" id="regBtn">
                        Sign Up <i class="fa-solid fa-arrow-right ms-2"></i>
                    </button>

                    <div id="regError" class="alert custom-alert d-none" role="alert"></div>

                    <p class="text-white-50 mb-0 pb-4">Already have an account? <a href="login.html" class="text-white fw-semibold text-decoration-none ms-1">Sign In</a></p>
                </form>
            </div>
        </div>
    </div>
    </div>

    <!-- Firebase App Module -->
    <script type="module" src="js/auth.js"></script>
</body>
</html>
